name: Screenshots

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: |
          cp Local.xcconfig.example Local.xcconfig
          xcodegen generate

      - name: Boot simulator
        run: |
          set -e
          DEVICE_ID=$(xcrun simctl list devices available -j | jq -r '
            [.devices
              | to_entries[]
              | select(.key | contains("iOS"))
              | .value[]
              | select(.name | startswith("iPhone"))
              | {priority: (if .name == "iPhone 17" then 1 else 0 end), udid: .udid}]
            | sort_by(.priority)
            | reverse
            | .[0].udid
          ')
          echo "SIM_UDID=$DEVICE_ID" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE_ID" || true

      - name: Run UI tests
        run: |
          xcodebuild test \
            -project ScorlyB.xcodeproj \
            -scheme ScorlyB \
            -destination "platform=iOS Simulator,id=${SIM_UDID}" \
            -resultBundlePath Screenshots.xcresult \
            -only-testing:ScorlyBUITests/ScreenshotUITests

      - name: Extract screenshots
        run: |
          set -e
          brew install chargepoint/xcparse/xcparse
          mkdir -p extracted
          xcparse screenshots --test ScreenshotUITests Screenshots.xcresult extracted

          mkdir -p docs/screenshots
          find extracted -name '*.png' | while read -r f; do
            base=$(basename "$f")
            # Names look like "00-auth_<uuid>.png" or similar; keep the
            # leading "NN-name" prefix and drop everything after it.
            clean=$(echo "$base" | sed -E 's/^([0-9]{2}-[a-z]+).*\.png$/\1.png/')
            cp "$f" "docs/screenshots/$clean"
          done
          ls -la docs/screenshots

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: docs/screenshots

      - name: Commit screenshots
        run: |
          git config user.name "An"
          git config user.email "andrei191539112@gmail.com"
          git add docs/screenshots
          git diff --cached --quiet || git commit -m "update screenshots"
          git push
