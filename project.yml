name: ScorlyB
options:
  bundleIdPrefix: com.andrei
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  ScorlyDomain:
    path: Packages/ScorlyDomain
  ScorlyData:
    path: Packages/ScorlyData
  ScorlyDesignSystem:
    path: Packages/ScorlyDesignSystem
  ScorlyFeatureAuth:
    path: Packages/ScorlyFeatureAuth
  ScorlyFeatureRound:
    path: Packages/ScorlyFeatureRound
  ScorlyFeatureHistory:
    path: Packages/ScorlyFeatureHistory

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  ScorlyB:
    type: application
    platform: iOS
    sources:
      - path: Scorly
      - path: PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - package: ScorlyDomain
      - package: ScorlyData
      - package: ScorlyDesignSystem
      - package: ScorlyFeatureAuth
      - package: ScorlyFeatureRound
      - package: ScorlyFeatureHistory
        product: ScorlyFeatureHistory
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    info:
      path: Scorly/Info.plist
      properties:
        CFBundleDisplayName: Scorly/B
        CFBundleLocalizations:
          - en
        CFBundleDevelopmentRegion: en
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Supabase config — values come from Local.xcconfig (gitignored).
        SCORLY_SUPABASE_URL: $(SCORLY_SUPABASE_URL)
        SCORLY_SUPABASE_ANON_KEY: $(SCORLY_SUPABASE_ANON_KEY)
        # Observability — kept off until pre-TestFlight, see Local.xcconfig.example.
        SCORLY_OBSERVABILITY_ENABLED: $(SCORLY_OBSERVABILITY_ENABLED)
        SCORLY_SENTRY_DSN: $(SCORLY_SENTRY_DSN)
        SCORLY_TELEMETRY_DECK_APP_ID: $(SCORLY_TELEMETRY_DECK_APP_ID)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrei.ScorlyB
        PRODUCT_NAME: ScorlyB
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

schemes:
  ScorlyB:
    build:
      targets:
        ScorlyB: all
    run:
      config: Debug
    archive:
      config: Release
